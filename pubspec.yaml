name: ramspeed
description: "A simple RAM speed calculator."
publish_to: 'none'
version: 1.2.5+1

environment:
  sdk: ^3.11.5

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  fonts:
    - family: VT323
      fonts:
        - asset: assets/VT323.ttf
  assets:
    - assets/appicon.png
  uses-material-design: true
